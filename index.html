<script>
setTimeout(function(){try{(function(){'use strict';

/* ── Config ── */
var FB='https://maruf-42ebb-default-rtdb.asia-southeast1.firebasedatabase.app';
var NS='marufhasanportfolio2025';
var CK='mhvc8';

/* ── DOM elements ── */
var tE=document.getElementById('todayVisits');
var aE=document.getElementById('totalVisits');
if(!tE||!aE)return;

/* ── Dhaka date (UTC+6) ── */
function gd(){
  try{return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Dhaka',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());}
  catch(e){var d=new Date(Date.now()+21600000);return d.toISOString().slice(0,10);}
}
var TD=gd(),TK=TD.replace(/-/g,'');

/* ── Show cache INSTANTLY ── */
var cc={};try{cc=JSON.parse(localStorage.getItem(CK)||'{}');}catch(e){cc={};}
if(cc.t>0)aE.textContent=cc.t;
if(cc.d===TD&&cc.y>0)tE.textContent=cc.y;else tE.textContent='0';

function sc(t,y){try{localStorage.setItem(CK,JSON.stringify({t:t,y:y,d:TD}));}catch(e){}}

/* ── Fetch with timeout ── */
function ft(u,o,m){m=m||10000;return new Promise(function(ok,no){
  var dn=false,tm=setTimeout(function(){if(!dn){dn=true;no(new Error('timeout'));}},m);
  fetch(u,o||{}).then(function(r){if(!dn){dn=true;clearTimeout(tm);ok(r);}})
  .catch(function(e){if(!dn){dn=true;clearTimeout(tm);no(e);}});
});}

/* ── Display once ── */
var done=false;
function show(t,y){if(done)return;done=true;if(t>0)aE.textContent=t;if(y>0)tE.textContent=y;sc(t,y);}

/* ══ Firebase: ATOMIC increment + read ══ */
function fbI(p){
  var u=FB+p+'.json';
  // Use Firebase server value for atomic increment (handles concurrent visits correctly)
  return ft(u,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({'.sv':{'increment':1}})
  },10000)
  .then(function(r){if(!r.ok)throw new Error(r.status);
  // Read back the new total
  return ft(u);})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});
}

function goFB(){return Promise.all([fbI('/visitors/total'),fbI('/visitors/daily/'+TK)])
  .then(function(r){show(r[0],r[1]);});}

/* ══ CounterAPI: simple increment endpoint ══ */
function goCA(){var b='https://api.counterapi.dev/v1';
  return Promise.all([
    ft(b+'/'+NS+'/totalvisits/up').then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(d){return d.count;}),
    ft(b+'/'+NS+'/today'+TK+'/up').then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(d){return d.count;})
  ]).then(function(r){show(r[0],r[1]);});}

/* ══ localStorage fallback ══ */
function goLS(){var d={};try{d=JSON.parse(localStorage.getItem(CK+'_l')||'{}');}catch(e){d={};}
  if(d.d!==TD){d.d=TD;d.y=0;}d.y=(d.y||0)+1;d.t=(d.t||0)+1;
  try{localStorage.setItem(CK+'_l',JSON.stringify(d));}catch(e){}show(d.t,d.y);}

/* ══ LAUNCH: Race both APIs simultaneously ══ */
goFB().catch(function(){});
goCA().catch(function(){});

/* ══ Failsafe: 15 seconds, then localStorage ══ */
setTimeout(function(){if(!done)goLS();},15000);

})();}catch(e){}},100);
</script>
